<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EliteRow Pro | GPS & Tide</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #00d2ff; --secondary: #3a7bd5; --bg-dark: #0f172a;
            --glass: rgba(255, 255, 255, 0.05); --glass-border: rgba(255, 255, 255, 0.1);
            --text: #f8fafc; --accent: #f43f5e; --success: #10b981; --warning: #f59e0b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #0f172a; color: var(--text); min-height: 100vh; }

        .app-container { display: grid; grid-template-columns: 260px 1fr; min-height: 100vh; }

        /* Navigation */
        aside { background: #070b14; border-right: 1px solid var(--glass-border); padding: 2rem; position: sticky; top: 0; height: 100vh; }
        .logo { font-size: 1.5rem; font-weight: 800; color: var(--primary); margin-bottom: 2rem; display: flex; align-items: center; gap: 10px; }
        nav li { list-style: none; padding: 12px; margin-bottom: 8px; border-radius: 10px; cursor: pointer; color: #64748b; transition: 0.3s; display: flex; align-items: center; gap: 12px; }
        nav li.active { background: var(--glass); color: var(--primary); }

        /* Main Content */
        main { padding: 2rem; max-width: 1200px; margin: 0 auto; width: 100%; }
        .card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 20px; padding: 1.5rem; margin-bottom: 1.5rem; }
        
        /* Marine Module */
        .tide-card { background: linear-gradient(135deg, rgba(15, 23, 42, 0.9), rgba(30, 41, 59, 0.9)); position: relative; }
        .location-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .location-badge { background: rgba(0, 210, 255, 0.2); color: var(--primary); padding: 5px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; display: flex; align-items: center; gap: 6px; }

        .tide-visual { height: 100px; background: rgba(0,0,0,0.3); border-radius: 15px; position: relative; margin: 15px 0; overflow: hidden; border: 1px solid var(--glass-border); }
        .water-fill { position: absolute; bottom: 0; width: 100%; background: linear-gradient(0deg, var(--secondary), var(--primary)); transition: height 2s ease-in-out; }
        
        .flow-indicator { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 12px; border-radius: 12px; font-weight: 700; margin-bottom: 15px; }
        .flow-up { background: rgba(16, 185, 129, 0.15); color: var(--success); }
        .flow-down { background: rgba(244, 63, 94, 0.15); color: var(--accent); }

        .tide-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat-item { background: rgba(0,0,0,0.2); padding: 10px; border-radius: 10px; text-align: center; }
        .stat-label { font-size: 0.65rem; color: #94a3b8; text-transform: uppercase; margin-bottom: 4px; }
        .stat-val { font-size: 1rem; font-weight: 700; }

        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 1.5rem; }

        @media (max-width: 900px) {
            .app-container { grid-template-columns: 1fr; }
            aside { position: fixed; bottom: 0; height: 70px; width: 100%; padding: 0; z-index: 1000; }
            nav ul { display: flex; justify-content: space-around; height: 100%; align-items: center; }
            nav li { flex-direction: column; gap: 2px; font-size: 0.6rem; padding: 5px; }
            .logo { display: none; }
            main { padding: 1rem; padding-bottom: 90px; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <aside>
        <div class="logo"><i class="fas fa-water"></i> ELITEROW</div>
        <nav>
            <ul>
                <li class="active" onclick="showSection('dashboard')"><i class="fas fa-home"></i><span>Dashboard</span></li>
                <li onclick="showSection('kids')"><i class="fas fa-users"></i><span>Kader</span></li>
                <li onclick="showSection('planner')"><i class="fas fa-calendar-alt"></i><span>Planer</span></li>
            </ul>
        </nav>
    </aside>

    <main>
        <section id="dashboard-section">
            <h2 id="welcome-msg">Dashboard</h2>
            
            <div class="dashboard-grid">
                <!-- TIDE & GPS CARD -->
                <div class="card tide-card">
                    <div class="location-header">
                        <h3 style="font-size: 1rem;">Marine Status</h3>
                        <div id="location-display" class="location-badge">
                            <i class="fas fa-location-arrow"></i> <span>Ortet...</span>
                        </div>
                    </div>

                    <div class="tide-visual">
                        <div id="tide-water" class="water-fill" style="height: 0%;"></div>
                        <div style="position: absolute; width: 100%; top: 30px; text-align: center;">
                            <span id="tide-perc" style="font-size: 1.5rem; font-weight: 800; text-shadow: 0 2px 8px rgba(0,0,0,0.5);">--%</span>
                            <div style="font-size: 0.6rem; opacity: 0.7; font-weight: 600;">PEGELSTAND</div>
                        </div>
                    </div>

                    <div id="flow-indicator" class="flow-indicator flow-up">
                        <i id="flow-icon" class="fas fa-sync-alt"></i>
                        <span id="flow-text">Berechne Strömung...</span>
                    </div>

                    <div class="tide-grid">
                        <div class="stat-item">
                            <div class="stat-label">Nächstes HW</div>
                            <div id="hw-time" class="stat-val">--:--</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">Nächstes NW</div>
                            <div id="nw-time" class="stat-val">--:--</div>
                        </div>
                    </div>
                </div>

                <!-- WEATHER CARD -->
                <div class="card">
                    <h3>Wetter Lokal</h3>
                    <div style="display: flex; align-items: center; gap: 20px; margin: 15px 0;">
                        <div id="temp-display" style="font-size: 2.5rem; font-weight: 800;">--°</div>
                        <div>
                            <div id="wind-display" style="font-weight: 600; color: var(--primary);">-- km/h Wind</div>
                            <div id="rain-display" style="font-size: 0.8rem; color: #94a3b8;">Regen-Check...</div>
                        </div>
                    </div>
                    <div style="font-size: 0.75rem; color: #64748b; font-style: italic;">
                        GPS: <span id="coords-display">Warte auf Signal...</span>
                    </div>
                </div>
            </div>
        </section>
        
        <!-- Weitere Sektionen (Platzhalter) -->
        <section id="kids-section" style="display:none;"><h2>Kader</h2><div class="card">Nutze das Dashboard für Live-Daten.</div></section>
        <section id="planner-section" style="display:none;"><h2>Planer</h2><div class="card">Inhalte folgen...</div></section>
    </main>
</div>

<script>
    // --- STANDORT & GPS LOGIK ---
    async function initLocation() {
        if ("geolocation" in navigator) {
            navigator.geolocation.getCurrentPosition(async (position) => {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;
                
                document.getElementById('coords-display').innerText = `${lat.toFixed(3)}, ${lon.toFixed(3)}`;
                
                // 1. Wetter für exakte Koordinaten laden
                fetchWeather(lat, lon);
                
                // 2. Ortsnamen via Reverse Geocoding finden (OpenStreetMap Nominatim)
                try {
                    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}`);
                    const data = await res.json();
                    const city = data.address.city || data.address.town || data.address.village || "Küste";
                    document.querySelector('#location-display span').innerText = city;
                } catch (e) {
                    document.querySelector('#location-display span').innerText = "Standort aktiv";
                }
            }, () => {
                document.querySelector('#location-display span').innerText = "GPS deaktiviert";
                fetchWeather(53.55, 8.58); // Fallback auf Norden
            });
        }
    }

    // --- GEZEITEN LOGIK (Simulierter Mondzyklus) ---
    function calculateTide() {
        const now = new Date();
        const cycle = 12.42 * 3600 * 1000; // 12h 25m Mond-Zyklus
        const refHW = new Date(); 
        refHW.setHours(2, 0, 0, 0); // Referenzpunkt

        let diff = (now - refHW) % cycle;
        if (diff < 0) diff += cycle;

        const angle = (diff / cycle) * 2 * Math.PI;
        const level = (Math.cos(angle) + 1) / 2;
        const levelPerc = Math.round(level * 100);

        // UI Update
        document.getElementById('tide-water').style.height = levelPerc + '%';
        document.getElementById('tide-perc').innerText = levelPerc + '%';

        // Strömung
        const isRising = diff > (cycle / 2);
        const flowBox = document.getElementById('flow-indicator');
        const flowText = document.getElementById('flow-text');
        const flowIcon = document.getElementById('flow-icon');

        if(isRising) {
            flowBox.className = "flow-indicator flow-up";
            flowText.innerText = "Wasser läuft auf (Flut)";
            flowIcon.className = "fas fa-arrow-up";
        } else {
            flowBox.className = "flow-indicator flow-down";
            flowText.innerText = "Wasser läuft ab (Ebbe)";
            flowIcon.className = "fas fa-arrow-down";
        }

        // Nächste HW/NW
        let timeToHW = (cycle - diff) % cycle;
        let timeToNW = (cycle/2 - diff);
        if(timeToNW < 0) timeToNW += cycle;

        const format = (ms) => new Date(Date.now() + ms).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        document.getElementById('hw-time').innerText = format(timeToHW);
        document.getElementById('nw-time').innerText = format(timeToNW);
    }

    // --- WETTER API ---
    async function fetchWeather(lat, lon) {
        try {
            const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,wind_speed_10m&hourly=precipitation_probability`);
            const data = await res.json();
            
            document.getElementById('temp-display').innerText = Math.round(data.current.temperature_2m) + '°';
            document.getElementById('wind-display').innerText = data.current.wind_speed_10m + ' km/h Wind';
            
            const rainProb = data.hourly.precipitation_probability[new Date().getHours()];
            document.getElementById('rain-display').innerText = `Regenrisiko: ${rainProb}%`;
        } catch(e) {
            console.error("Wetter-Fehler");
        }
    }

    // --- NAVIGATION ---
    function showSection(id) {
        document.querySelectorAll('main > section').forEach(s => s.style.display = 'none');
        document.getElementById(id + '-section').style.display = 'block';
        document.querySelectorAll('nav li').forEach(l => l.classList.remove('active'));
        event.currentTarget.classList.add('active');
    }

    // Start
    window.onload = () => {
        initLocation();
        calculateTide();
        setInterval(calculateTide, 60000); // Jede Minute Update
    };
</script>

</body>
</html>
