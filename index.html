<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EliteRow Planner Pro | Detail-Training</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root {
            --primary: #00d2ff; --secondary: #3a7bd5; --bg-dark: #0f172a;
            --glass: rgba(255, 255, 255, 0.05); --glass-border: rgba(255, 255, 255, 0.1);
            --text: #f8fafc; --accent: #f43f5e; --success: #10b981; --warning: #f59e0b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: radial-gradient(circle at top left, #1e293b, #0f172a); color: var(--text); min-height: 100vh; }

        .app-container { display: grid; grid-template-columns: 280px 1fr; min-height: 100vh; }

        /* Sidebar */
        aside { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); border-right: 1px solid var(--glass-border); padding: 2rem; position: sticky; top: 0; height: 100vh; }
        .logo { font-size: 1.6rem; font-weight: 800; background: linear-gradient(to right, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 2rem; }
        nav li { padding: 12px; margin-bottom: 8px; border-radius: 10px; cursor: pointer; transition: 0.3s; list-style: none; color: #94a3b8; display: flex; align-items: center; gap: 10px; }
        nav li:hover, nav li.active { background: var(--glass); color: var(--primary); }

        /* Main Content */
        main { padding: 2.5rem; max-width: 1200px; margin: 0 auto; width: 100%; }
        .card { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid var(--glass-border); border-radius: 20px; padding: 2rem; margin-bottom: 2rem; }
        h2 { font-size: 1.8rem; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 12px; }

        /* Planner Controls */
        .planner-config { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .mode-toggle { display: flex; background: #000; border-radius: 12px; padding: 5px; margin-bottom: 20px; }
        .mode-btn { flex: 1; padding: 10px; border-radius: 8px; border: none; cursor: pointer; background: transparent; color: white; font-weight: 600; transition: 0.3s; }
        .mode-btn.active { background: var(--secondary); }

        /* Training Plan Detail Styling */
        .kid-plan-card { background: rgba(255,255,255,0.03); border-left: 4px solid var(--primary); padding: 20px; border-radius: 12px; margin-bottom: 25px; }
        .exercise-block { margin-top: 15px; padding-left: 15px; border-left: 1px solid #334155; }
        .ex-title { color: var(--primary); font-weight: 600; font-size: 1rem; margin-bottom: 4px; }
        .ex-desc { color: #94a3b8; font-size: 0.85rem; margin-bottom: 10px; line-height: 1.4; }
        .ex-instruction { background: rgba(0,210,255,0.1); padding: 10px; border-radius: 6px; font-size: 0.85rem; color: #e2e8f0; border-left: 3px solid var(--primary); }

        /* Forms */
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 5px; font-size: 0.8rem; color: #94a3b8; text-transform: uppercase; }
        input, select { width: 100%; background: #0f172a; border: 1px solid #334155; padding: 12px; border-radius: 8px; color: white; }
        .btn { background: var(--secondary); color: white; padding: 12px 24px; border-radius: 10px; border: none; cursor: pointer; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; transition: 0.3s; }
        .btn:hover { background: var(--primary); transform: translateY(-2px); }
        .btn-ghost { background: transparent; border: 1px solid var(--glass-border); }

        .badge { padding: 4px 8px; border-radius: 6px; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; }
        .badge-water { background: #0369a1; }
        .badge-hall { background: #7c3aed; }

        @media (max-width: 900px) { .app-container { grid-template-columns: 1fr; } aside { display: none; } }
    </style>
</head>
<body>

<div class="app-container">
    <aside>
        <div class="logo"><i class="fas fa-water"></i> ELITEROW</div>
        <nav>
            <li class="active" onclick="showSection('dashboard')"><i class="fas fa-home"></i> Dashboard</li>
            <li onclick="showSection('kids')"><i class="fas fa-users"></i> Kader</li>
            <li onclick="showSection('planner')"><i class="fas fa-calendar-check"></i> Trainingsplan</li>
        </nav>
    </aside>

    <main>
        <!-- DASHBOARD -->
        <section id="dashboard-section">
            <h2>Dashboard</h2>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="card">
                    <h3><i class="fas fa-cloud-sun"></i> Live-Wetter</h3>
                    <div id="weather-info" style="font-size: 1.5rem; margin: 15px 0;">Lade Daten...</div>
                    <p id="weather-hint" style="color: var(--warning);"></p>
                </div>
                <div class="card">
                    <h3><i class="fas fa-info-circle"></i> Kader-Status</h3>
                    <div id="stats-info" style="font-size: 1.5rem; margin: 15px 0;">0 Kinder aktiv</div>
                </div>
            </div>
        </section>

        <!-- KIDS -->
        <section id="kids-section" style="display:none;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2>Kader-Management</h2>
                <button class="btn" onclick="openModal()"><i class="fas fa-plus"></i> Kind hinzufügen</button>
            </div>
            <div id="kids-list" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 20px;"></div>
        </section>

        <!-- PLANNER -->
        <section id="planner-section" style="display:none;">
            <h2>Trainingsplan-Generator</h2>
            <div class="card">
                <div class="mode-toggle">
                    <button id="btn-water" class="mode-btn active" onclick="setMode('Wasser')">WASSERTRAINING</button>
                    <button id="btn-hall" class="mode-btn" onclick="setMode('Halle')">HALLENTRAINING</button>
                </div>
                
                <div class="planner-config">
                    <div class="form-group">
                        <label>Wettkampf-Datum</label>
                        <input type="date" id="comp-date">
                    </div>
                    <div class="form-group">
                        <label>Dauer (Minuten)</label>
                        <input type="number" id="train-duration" value="90">
                    </div>
                </div>
                
                <button class="btn" onclick="generateDetailedPlan()"><i class="fas fa-magic"></i> Plan detailliert generieren</button>
                <button class="btn btn-ghost" onclick="exportPDF()"><i class="fas fa-file-pdf"></i> PDF Export</button>
            </div>

            <div id="plan-output" style="display:none;">
                <!-- Hier landet der detaillierte Plan -->
            </div>
        </section>
    </main>
</div>

<!-- MODAL -->
<div id="modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:100; align-items:center; justify-content:center;">
    <div class="card" style="width: 400px;">
        <h3>Kind hinzufügen</h3>
        <div class="form-group">
            <label>Name</label>
            <input type="text" id="k-name">
        </div>
        <div class="form-group">
            <label>Erfahrungslevel</label>
            <select id="k-level">
                <option value="1">Anfänger (Level 1)</option>
                <option value="2">Fortgeschritten (Level 2)</option>
                <option value="3">Leistungssport (Level 3)</option>
                <option value="4">Elite/Wettkampf (Level 4)</option>
            </select>
        </div>
        <div class="form-group">
            <label>Wettkampf-Teilnahme</label>
            <select id="k-comp">
                <option value="ja">Ja</option>
                <option value="nein">Nein</option>
            </select>
        </div>
        <div style="display: flex; gap: 10px;">
            <button class="btn" onclick="saveKid()">Speichern</button>
            <button class="btn btn-ghost" onclick="closeModal()">Abbrechen</button>
        </div>
    </div>
</div>

<script>
    let state = {
        kids: JSON.parse(localStorage.getItem('rowing_v2_kids')) || [],
        mode: 'Wasser', // Standard
        weather: { wind: 0, temp: 0 }
    };

    window.onload = () => {
        fetchWeather();
        renderKids();
        updateStats();
    };

    function setMode(m) {
        state.mode = m;
        document.getElementById('btn-water').classList.toggle('active', m === 'Wasser');
        document.getElementById('btn-hall').classList.toggle('active', m === 'Halle');
    }

    async function fetchWeather() {
        try {
            const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=53.55&longitude=8.59&current=temperature_2m,wind_speed_10m');
            const data = await res.json();
            state.weather.wind = data.current.wind_speed_10m;
            state.weather.temp = data.current.temperature_2m;
            document.getElementById('weather-info').innerHTML = `${state.weather.temp}°C | Wind: ${state.weather.wind} km/h`;
            if(state.weather.wind > 20) {
                document.getElementById('weather-hint').innerText = "Achtung: Wind zu stark für Wassertraining!";
            }
        } catch(e) {}
    }

    function showSection(id) {
        document.querySelectorAll('main > section').forEach(s => s.style.display = 'none');
        document.getElementById(id + '-section').style.display = 'block';
        document.querySelectorAll('nav li').forEach(l => l.classList.remove('active'));
        event.currentTarget.classList.add('active');
    }

    /* KIDS CRUD */
    function openModal() { document.getElementById('modal').style.display = 'flex'; }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    function saveKid() {
        const name = document.getElementById('k-name').value;
        const level = parseInt(document.getElementById('k-level').value);
        const comp = document.getElementById('k-comp').value;
        if(!name) return;
        state.kids.push({ id: Date.now(), name, level, comp });
        localStorage.setItem('rowing_v2_kids', JSON.stringify(state.kids));
        renderKids(); updateStats(); closeModal();
    }
    function deleteKid(id) {
        state.kids = state.kids.filter(k => k.id !== id);
        localStorage.setItem('rowing_v2_kids', JSON.stringify(state.kids));
        renderKids(); updateStats();
    }
    function renderKids() {
        const list = document.getElementById('kids-list');
        list.innerHTML = state.kids.map(k => `
            <div class="card" style="padding: 15px;">
                <h4>${k.name}</h4>
                <p style="font-size:0.8rem; color:#94a3b8;">Level ${k.level} | WK: ${k.comp}</p>
                <button class="btn btn-ghost" onclick="deleteKid(${k.id})" style="margin-top:10px; padding: 5px 10px;">Löschen</button>
            </div>
        `).join('');
    }
    function updateStats() { document.getElementById('stats-info').innerText = `${state.kids.length} Kinder im Kader`; }

    /* DETAIL GENERATOR LOGIC */
    function generateDetailedPlan() {
        if(state.kids.length === 0) return alert("Kader leer!");
        const output = document.getElementById('plan-output');
        const phase = calculatePhase();
        
        let html = `<div id="plan-capture" style="background:#0f172a; padding:30px; border-radius:20px; border: 1px solid #334155;">
            <div style="text-align:center; margin-bottom:30px; border-bottom: 2px solid var(--primary); padding-bottom:15px;">
                <h1 style="color:white;">TRAININGSPLAN: ${state.mode.toUpperCase()}</h1>
                <p style="color:var(--primary); font-weight:bold;">Phase: ${phase} | Ort: Bremerhaven | Datum: ${new Date().toLocaleDateString()}</p>
            </div>`;

        state.kids.forEach(kid => {
            html += generateIndividualKidPlan(kid, phase, state.mode);
        });

        html += `</div>`;
        output.innerHTML = html;
        output.style.display = 'block';
    }

    function calculatePhase() {
        const d = document.getElementById('comp-date').value;
        if(!d) return "Grundlagenausdauer (GA)";
        const diff = (new Date(d) - new Date()) / (1000*3600*24);
        if(diff < 14) return "Wettkampf-Peak (Tapering)";
        if(diff < 45) return "Spezifische Ausdauer (WSA)";
        return "Aufbauphase (Technik & Kraft)";
    }

    function generateIndividualKidPlan(kid, phase, mode) {
        const exercises = (mode === 'Wasser') ? getWaterDetails(kid, phase) : getHallDetails(kid, phase);
        
        return `
        <div class="kid-plan-card">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h3 style="color:white;">Für: ${kid.name}</h3>
                <span class="badge ${mode === 'Wasser' ? 'badge-water' : 'badge-hall'}">${mode}</span>
            </div>
            <p style="font-size:0.85rem; color:var(--primary); margin-bottom:15px;">Level-Ziel: ${getLevelGoal(kid.level)}</p>
            
            <div class="exercise-block">
                <div class="ex-title">1. Vorbereitung & Mobilisation (15 Min)</div>
                <div class="ex-desc">${exercises.warmup.name}</div>
                <div class="ex-instruction"><strong>Was ist zu tun?</strong> ${exercises.warmup.desc}</div>
            </div>

            <div class="exercise-block">
                <div class="ex-title">2. Technik-Fokus (25 Min)</div>
                <div class="ex-desc">${exercises.technique.name}</div>
                <div class="ex-instruction"><strong>Ausführung:</strong> ${exercises.technique.desc}</div>
            </div>

            <div class="exercise-block">
                <div class="ex-title">3. Hauptbelastung (40 Min)</div>
                <div class="ex-desc">${exercises.main.name}</div>
                <div class="ex-instruction"><strong>Zielwert:</strong> ${exercises.main.desc}</div>
            </div>

            <div class="exercise-block">
                <div class="ex-title">4. Cool-down & Bootspflege (10 Min)</div>
                <div class="ex-desc">Locker Auspaddeln / Dehnen</div>
                <div class="ex-instruction">Dehnen der Hüftbeuger und des unteren Rückens. Boot mit Süßwasser reinigen.</div>
            </div>
        </div>`;
    }

    function getLevelGoal(lvl) {
        const goals = ["", "Gleichgewicht & Bootsgefühl", "Rhythmus & Rollsitzführung", "Druckaufbau & Wasserarbeit", "Renntaktik & Schnellkraft"];
        return goals[lvl];
    }

    /* DATA REPOSITORY FOR TASKS */
    function getWaterDetails(kid, phase) {
        const data = {
            warmup: { name: "Einrudern & Core-Aktivierung", desc: "15 Min ganz lockeres Paddeln. Alle 500m 10 Schläge nur mit den Armen, um die Verbindung zum Wasser zu spüren." },
            technique: {}, main: {}
        };

        if(kid.level <= 2) {
            data.technique = { name: "Pausenrudern (Balance)", desc: "Rudere normale Schläge, aber stoppe die Bewegung für 2 Sek., wenn die Hände über den Knien sind. Das Boot muss dabei völlig gerade liegen." };
            data.main = { name: "GA1 - Ausdauer", desc: "4 x 1000m mit 2 Min Pause. Fokus auf konstanten Schlagrhythmus (SF 18-20)." };
        } else {
            data.technique = { name: "Blattführung (Anrollen)", desc: "Fokus auf das frühzeitige Aufdrehen der Blätter. Das Blatt muss 10cm vor dem Umkehrpunkt bereits senkrecht stehen." };
            data.main = phase.includes("Peak") ? 
                { name: "Sprints (WSA)", desc: "10 x 250m Vollgas. SF 32-36. Volle Konzentration auf den explosiven Beinstoß." } :
                { name: "Pyramidentraining", desc: "2000m - 1000m - 500m - 1000m - 2000m. SF 20/22/24/22/20." };
        }
        return data;
    }

    function getHallDetails(kid, phase) {
        const data = {
            warmup: { name: "Dynamisches Warm-up", desc: "10 Min Laufen, Hopserlauf, Armkreisen. Danach 5 Min Mobilisation der Sprunggelenke." },
            technique: {}, main: {}
        };

        if(kid.level <= 2) {
            data.technique = { name: "Ergo-Positionsschulung", desc: "Arbeite nur am Ergo. Fokus auf die Reihenfolge: Erst Arme, dann Oberkörper, dann Beine beim Vorrollen." };
            data.main = { name: "Koordinations-Zirkel", desc: "3 Runden: 30 Sek Plank, 30 Sek Einbeinstand auf Matte, 30 Sek Medizinball-Rotation." };
        } else {
            data.technique = { name: "Kraftübertragung (Drag Factor)", desc: "Stelle den Luftklappenwert auf 110. Versuche bei SF 20 die maximale Wattzahl pro Schlag zu erreichen." };
            data.main = { name: "Intervall-Ergo", desc: "3 x 10 Min (UT1-Bereich). Puls 150-160. Fokus auf sauberen Endzug ohne Reißen." };
        }
        return data;
    }

    /* PDF EXPORT */
    async function exportPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('p', 'pt', 'a4');
        const element = document.getElementById('plan-capture');
        if(!element) return alert("Erst Plan generieren!");

        await html2canvas(element, { scale: 2 });
        doc.html(element, {
            callback: function(doc) { doc.save(`EliteRow_Plan.pdf`); },
            x: 20, y: 20, width: 550, windowWidth: 1000
        });
    }
</script>
</body>
</html>
