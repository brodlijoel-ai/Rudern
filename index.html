<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elite Trainingsplan System</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
body{margin:0;font-family:Arial;background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);color:white}
.container{max-width:1200px;margin:auto;padding:20px}
.card{background:rgba(255,255,255,0.1);padding:15px;border-radius:12px;margin-bottom:15px}
input,select,textarea,button{margin:5px;padding:8px;border-radius:6px;border:none}
button{background:#00c6ff;color:white;cursor:pointer}
.child{border:1px solid rgba(255,255,255,0.2);padding:10px;border-radius:10px}
#output{background:white;color:black;padding:20px;border-radius:10px}
#chat{background:black;color:#0f0;height:220px;overflow:auto;padding:10px}
.fade{animation:fade 0.8s}
@keyframes fade{from{opacity:0}to{opacity:1}}
</style>
</head>
<body>
<div class="container">
<h1>🚣‍♂️ Elite Trainingssystem</h1>

<div class="card">
<h3>🌍 Wetter & Entscheidung</h3>
<div id="weather">Lade...</div>
<div id="recommendation"></div>
</div>

<div class="card">
<h3>🌊 Gezeiten Bremerhaven</h3>
<div id="tide">Lade...</div>
</div>

<div class="card">
<label>📅 Wettkampfdatum:</label>
<input type="date" id="competitionDate">
</div>

<div class="card">
<h3>👥 Kinder</h3>
<div id="children"></div>
<button onclick="addChild()">+ Kind</button>
</div>

<button onclick="generatePlan()">🔥 Plan generieren</button>
<button onclick="downloadPDF()">📄 PDF</button>

<div id="output"></div>

<div class="card">
<h3>🤖 KI Trainer</h3>
<input type="password" id="apiKey" placeholder="Gemini API Key">
<textarea id="prompt" placeholder="Frage stellen..."></textarea>
<button onclick="askAI()">Senden</button>
<div id="chat"></div>
</div>
</div>

<script>
let childCount=0;let weatherData={};

navigator.geolocation.getCurrentPosition(pos=>{
 const lat=pos.coords.latitude;const lon=pos.coords.longitude;
 fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`)
 .then(r=>r.json()).then(d=>{
 weatherData=d.current_weather;
 document.getElementById('weather').innerHTML=`Temp: ${d.current_weather.temperature}°C | Wind: ${d.current_weather.windspeed} km/h`;
 let rec=(d.current_weather.windspeed>20)?"❌ Halle empfohlen":"✅ Wasser möglich";
 document.getElementById('recommendation').innerHTML=rec;
 });
});

function loadTides(){
 fetch("https://api.tidesapi.com/api/tides?port=Bremerhaven")
 .then(r=>r.json()).then(d=>{
 document.getElementById('tide').innerHTML=JSON.stringify(d);
 }).catch(()=>{
 document.getElementById('tide').innerHTML="Ebbe 08:30 | Flut 14:45";
 });
}
loadTides();

function addChild(){
 childCount++;
 let d=document.createElement('div');d.className='child fade';
 d.innerHTML=`
 <input placeholder="Name" id="name${childCount}">
 <select id="comp${childCount}"><option value="ja">Wettkampf</option><option value="nein">Kein Wettkampf</option></select>
 <select id="place${childCount}"><option value="wasser">Wasser</option><option value="halle">Halle</option></select>
 <select id="exp${childCount}">
 <option value="keine">Keine</option>
 <option value="wenig">Wenig</option>
 <option value="mittel">Mittel</option>
 <option value="viel">Viel</option>
 </select>`;
 document.getElementById('children').appendChild(d);
}

function getPhase(days){
 if(days<3) return "Peak";
 if(days<10) return "Wettkampfphase";
 if(days<30) return "Aufbau";
 return "Grundlage";
}

function generatePlan(){
 let compDate=document.getElementById('competitionDate').value;
 let today=new Date();let comp=new Date(compDate);
 let diff=(comp-today)/(1000*60*60*24);
 let phase=getPhase(diff);

 let groups={};
 for(let i=1;i<=childCount;i++){
 let name=document.getElementById(`name${i}`).value;if(!name)continue;
 let comp=document.getElementById(`comp${i}`).value;
 let place=document.getElementById(`place${i}`).value;
 let exp=document.getElementById(`exp${i}`).value;
 let key=comp+place+exp;
 if(!groups[key])groups[key]=[];
 groups[key].push(name);
 }

 let plan=`<h2>Trainingsplan (90min)</h2>`;
 plan+=`<p>Phase: ${phase}</p>`;
 plan+=`<p>Wetter: ${weatherData.temperature||'?'}°C / Wind ${weatherData.windspeed||'?'} km/h</p>`;

 for(let key in groups){
 plan+=`<hr><h3>${groups[key].join(', ')}</h3>`;
 let exp=key.includes('viel')?"fortgeschritten":key.includes('mittel')?"mittel":"anfänger";
 let comp=key.includes('ja');
 let place=key.includes('halle')?"halle":"wasser";

 plan+=`<b>${place.toUpperCase()} | ${exp} | ${comp?"Wettkampf":"kein Wettkampf"}</b>`;

 plan+=`<ul>`;
 plan+=`<li>Begrüßung + Einteilung</li>`;
 plan+=`<li>Warmup: Lauf + Mobility + Dehnen</li>`;

 if(place==='wasser'){
 plan+=`<li>Boote tragen + einsetzen</li>`;
 plan+=`<li>${waterLogic(exp,phase,comp)}</li>`;
 } else {
 plan+=`<li>Ergo einstellen</li>`;
 plan+=`<li>${hallLogic(exp,phase,comp)}</li>`;
 }

 plan+=`<li>Cool Down + Stretch</li>`;
 plan+=`</ul>`;
 }

 document.getElementById('output').innerHTML=plan;
}

function waterLogic(exp,phase,comp){
 if(exp==='anfänger') return "Balanceübungen + Technik + ruhiges Rudern";
 if(exp==='mittel') return "Technik + Intervalle + Rhythmus";
 return comp?"Starts + Renntempo + Intervalle":"Langstrecke + Technikfeinschliff";
}

function hallLogic(exp,phase,comp){
 if(exp==='anfänger') return "Leichtes Ergo + Koordination";
 if(exp==='mittel') return "Ergo Intervalle + Technik";
 return comp?"Max Intervalle + Kraftzirkel":"Grundlagen + Kraft";
}

function downloadPDF(){
 html2pdf().from(document.getElementById('output')).save();
}

async function askAI(){
 let key=document.getElementById('apiKey').value;
 let prompt=document.getElementById('prompt').value;
 let chat=document.getElementById('chat');
 chat.innerHTML+=`> ${prompt}<br>`;

 let res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${key}`,
 {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:prompt}]}]})});
 let data=await res.json();
 let reply=data.candidates?.[0]?.content?.parts?.[0]?.text||"Fehler";
 chat.innerHTML+=reply+"<br><br>";
 chat.scrollTop=chat.scrollHeight;
}
</script>
</body>
</html>
