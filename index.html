<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Geeste Ruder Coach</title>
    <style>
        :root { --blue: #007AFF; --dark: #1C1C1E; --light: #F2F2F7; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--light); margin: 0; padding: 20px; padding-top: 60px; }
        .card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h1 { font-size: 28px; font-weight: 800; margin-bottom: 20px; }
        h2 { font-size: 18px; color: #8E8E93; margin: 0 0 10px 0; text-transform: uppercase; letter-spacing: 1px; }
        .data { font-size: 22px; font-weight: 600; color: var(--dark); }
        select, button { width: 100%; padding: 15px; border-radius: 12px; border: none; font-size: 17px; margin-top: 10px; }
        button { background: var(--blue); color: white; font-weight: 600; cursor: pointer; }
        .rec-box { background: #E5F1FF; border-left: 5px solid var(--blue); padding: 15px; border-radius: 0 12px 12px 0; }
        .warmup-item { display: flex; align-items: center; margin-bottom: 10px; }
        .dot { height: 10px; width: 10px; background: var(--blue); border-radius: 50%; margin-right: 10px; }
    </style>
</head>
<body>

    <h1>🚣‍♂️ Geeste Coach</h1>

    <div class="card">
        <h2>Aktuelles Wetter (BHV)</h2>
        <div id="weather" class="data">Lade Daten...</div>
    </div>

    <div class="card">
        <h2>Gezeiten auf der Geeste</h2>
        <select id="tide">
            <option value="flut">Flut (Strömung landeinwärts)</option>
            <option value="ebbe">Ebbe (Strömung seewärts)</option>
            <option value="hoch">Hochwasser (Stillstand)</option>
        </select>
        <button onclick="getPlan()">Trainingsplan erstellen</button>
    </div>

    <div id="result" class="card" style="display:none;">
        <h2>Dein Training</h2>
        <div id="plan" class="rec-box"></div>
        <h2 style="margin-top:20px;">Vorgehen: Warm-Up</h2>
        <div class="warmup-item"><div class="dot"></div> 5 Min. Arme & Schultern kreisen</div>
        <div class="warmup-item"><div class="dot"></div> 10x Kniebeugen (langsam)</div>
        <div class="warmup-item"><div class="dot"></div> Rumpf-Rotation</div>
    </div>

    <script>
        async function fetchWeather() {
            // Koordinaten für Bremerhaven Geeste-Mündung
            const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=53.54&longitude=8.58&current_weather=true');
            const data = await response = await res.json();
            const w = data.current_weather;
            document.getElementById('weather').innerHTML = `${w.temperature}°C | ${w.windspeed} km/h Wind`;
        }

        function getPlan() {
            const t = document.getElementById('tide').value;
            const resDiv = document.getElementById('result');
            const planDiv = document.getElementById('plan');
            resDiv.style.display = "block";

            let tipp = "";
            if(t === "flut") tipp = "<b>Kraft-Ausdauer:</b> Gegen die Flut landeinwärts drücken. Fokus auf kräftige Beinarbeit.";
            if(t === "ebbe") tipp = "<b>Technik:</b> Mit der Strömung Richtung Weser. Fokus auf sauberes Ausheben und langes Rollen.";
            if(t === "hoch") tipp = "<b>Sprints:</b> Ideale Zeit für 500m Intervalle, da kaum Strömung stört.";

            planDiv.innerHTML = tipp;
            window.scrollTo(0, document.body.scrollHeight);
        }

        fetchWeather();
    </script>
</body>
</html>
