<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Geeste Ruder Coach</title>
    <style>
        :root { --blue: #007AFF; --dark: #1C1C1E; --light: #F2F2F7; --orange: #FF9500; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--light); margin: 0; padding: 20px; padding-top: 50px; }
        .card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h1 { font-size: 26px; font-weight: 800; margin-bottom: 20px; text-align: center; }
        h2 { font-size: 13px; color: #8E8E93; margin: 0 0 10px 0; text-transform: uppercase; }
        
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 5px; color: #444; }
        
        input, select { 
            width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; 
            font-size: 16px; background: #fff; box-sizing: border-box;
        }
        
        .btn-main { 
            width: 100%; padding: 18px; border-radius: 15px; border: none; 
            background: var(--blue); color: white; font-size: 18px; font-weight: 700; 
            margin-top: 10px; cursor: pointer; -webkit-appearance: none;
        }
        
        .btn-auto { 
            background: none; color: var(--blue); border: 1px solid var(--blue); 
            padding: 8px; border-radius: 8px; font-size: 12px; margin-top: 5px; width: auto;
        }

        .result-box { 
            display: none; background: #fff; border-radius: 20px; padding: 20px; 
            border: 2px solid var(--blue); margin-top: 10px;
        }
        
        .warning { color: #FF3B30; font-weight: 700; display: none; margin-bottom: 10px; }
        .highlight { color: var(--blue); font-weight: 700; }
    </style>
</head>
<body>

    <h1>🚣‍♂️ Geeste Coach</h1>

    <div class="card">
        <h2>Wetter & Wind einstellen</h2>
        
        <div class="input-group">
            <label>Temperatur (°C)</label>
            <input type="number" id="manual-temp" value="15">
        </div>

        <div class="input-group">
            <label>Windgeschwindigkeit (km/h)</label>
            <input type="number" id="manual-wind" value="10">
        </div>

        <div class="input-group">
            <label>Gezeiten-Zustand</label>
            <select id="manual-tide">
                <option value="flut">Flut (Strömung landeinwärts)</option>
                <option value="ebbe">Ebbe (Strömung seewärts)</option>
                <option value="hoch">Hochwasser (Stillstand)</option>
                <option value="niedrig">Niedrigwasser (Vorsicht Schlick)</option>
            </select>
        </div>

        <button class="btn-auto" onclick="fetchAutoWeather()">Aktuelle Live-Daten laden</button>
    </div>

    <button class="btn-main" onclick="generateTraining()">Training berechnen</button>

    <div id="result" class="result-box">
        <div id="wind-warning" class="warning">⚠️ STARKWIND-WARNUNG!</div>
        <h3 id="plan-title">Dein Plan</h3>
        <p id="plan-text"></p>
        <hr>
        <p><strong>Vorgehen:</strong><br>
        1. 5 Min. Mobilisation am Steg<br>
        2. Dehnen: Schultern & unterer Rücken<br>
        3. Wasserarbeit laut Plan</p>
    </div>

    <script>
        // Wetter automatisch laden (als Startwert)
        async function fetchAutoWeather() {
            try {
                const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=53.54&longitude=8.58&current_weather=true');
                const data = await res.json();
                document.getElementById('manual-temp').value = Math.round(data.current_weather.temperature);
                document.getElementById('manual-wind').value = Math.round(data.current_weather.windspeed);
                alert("Live-Daten für Bremerhaven geladen!");
            } catch (e) {
                alert("Fehler beim Laden der Live-Daten.");
            }
        }

        function generateTraining() {
            const temp = document.getElementById('manual-temp').value;
            const wind = document.getElementById('manual-wind').value;
            const tide = document.getElementById('manual-tide').value;
            
            const resDiv = document.getElementById('result');
            const warning = document.getElementById('wind-warning');
            const title = document.getElementById('plan-title');
            const text = document.getElementById('plan-text');

            resDiv.style.display = "block";

            // Wind-Check
            if (wind >= 25) {
                warning.style.display = "block";
                warning.innerText = `⚠️ Warnung: ${wind} km/h Wind! Wellen auf der Geeste beachten.`;
            } else {
                warning.style.display = "none";
            }

            // Strategie-Logik
            let plan = "";
            if (tide === "flut") {
                plan = `Bei Flut drückt das Wasser landeinwärts. <span class="highlight">Training: Kraft-Ausdauer.</span> Rudere gegen den Strom (Richtung Schiffdorf) für maximalen Widerstand.`;
            } else if (tide === "ebbe") {
                plan = `Ebbe zieht dich Richtung Mündung/Weser. <span class="highlight">Training: Technik & Frequenz.</span> Nutze den Schub für schnelle, saubere Schläge. Achte auf Treibgut!`;
            } else if (tide === "hoch") {
                plan = `<span class="highlight">Training: Belastung / Zeitfahren.</span> Das Wasser steht fast still. Perfekt um die 500m oder 1000m Zeit zu testen.`;
            } else {
                plan = `Niedrigwasser. <span class="highlight">Training: Lockeres Paddeln.</span> Achte auf die Fahrrinne und Steine am Rand. Fokus auf Rhythmusgefühl.`;
            }

            title.innerText = `Plan bei ${temp}°C und ${wind} km/h Wind`;
            text.innerHTML = plan;
            
            resDiv.scrollIntoView({ behavior: 'smooth' });
        }

        // Beim ersten Laden einmal die echten Daten holen
        window.onload = fetchAutoWeather;
    </script>
</body>
</html>
