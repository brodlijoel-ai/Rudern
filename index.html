<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Geeste Kids Coach</title>
    <style>
        :root { --blue: #007AFF; --dark: #1C1C1E; --light: #F2F2F7; --green: #34C759; }
        body { font-family: -apple-system, sans-serif; background: var(--light); margin: 0; padding: 20px; padding-top: 40px; }
        .card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 8px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h1 { font-size: 24px; text-align: center; color: var(--blue); }
        label { display: block; font-size: 13px; font-weight: 600; margin: 10px 0 5px; color: #666; }
        input, select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; font-size: 16px; box-sizing: border-box; }
        .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; font-size: 17px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-blue { background: var(--blue); color: white; }
        .btn-green { background: var(--green); color: white; margin-top: 15px; display: none; }
        .result-box { display: none; margin-top: 20px; line-height: 1.6; }
        .time-badge { background: #eee; padding: 2px 8px; border-radius: 5px; font-weight: bold; font-size: 14px; }
        .warning { color: #FF3B30; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

    <h1>🚣‍♂️ Geeste Kids Coach (10-14j)</h1>

    <div class="card">
        <label>Temperatur (°C)</label>
        <input type="number" id="temp" value="12">
        
        <label>Wind (km/h)</label>
        <input type="number" id="wind" value="10">

        <label>Gezeiten</label>
        <select id="tide">
            <option value="flut">Flut (Strömung hoch)</option>
            <option value="ebbe">Ebbe (Strömung runter)</option>
            <option value="hoch">Hochwasser (Stillstand)</option>
        </select>

        <button class="btn btn-blue" onclick="createPlan()">Plan erstellen</button>
    </div>

    <div id="result" class="card result-box">
        <div id="wind-warn" class="warning" style="display:none;">⚠️ Achtung: Viel Wind für Kinder!</div>
        <div id="full-plan"></div>
        <button id="dl-btn" class="btn btn-green" onclick="downloadPlan()">📥 Plan als .txt speichern</button>
    </div>

    <script>
        function createPlan() {
            const temp = document.getElementById('temp').value;
            const wind = document.getElementById('wind').value;
            const tide = document.getElementById('tide').value;
            const resBox = document.getElementById('result');
            const planDiv = document.getElementById('full-plan');
            const warn = document.getElementById('wind-warn');

            resBox.style.display = "block";
            document.getElementById('dl-btn').style.display = "block";
            warn.style.display = wind > 20 ? "block" : "none";

            let foki = "";
            if(tide === "flut") foki = "Kraft & Ausdauer (Gegenstrom drücken)";
            else if(tide === "ebbe") foki = "Schnelligkeit & Rhythmus (Mit dem Strom rollen)";
            else foki = "Technik & Sprints (Ruhiges Wasser)";

            const content = `
                <h3>📋 90 Min. Training (${temp}°C, ${wind}km/h Wind)</h3>
                <p><strong>Fokus:</strong> ${foki}</p>
                <hr>
                <p><span class="time-badge">00-15m</span> <b>Ankommen & Aufwärmen:</b><br>Boote klarmachen, 5 Min. Laufen am Deich, Arme/Schultern kreisen.</p>
                <p><span class="time-badge">15-30m</span> <b>Einfahren:</b><br>Technik-Drill: 'Wippe' oder nur aus den Armen rudern. Fokus: Blatt sauber setzen.</p>
                <p><span class="time-badge">30-70m</span> <b>Hauptteil:</b><br>${getHauptteil(tide)}</p>
                <p><span class="time-badge">70-80m</span> <b>Spiel/Challenge:</b><br>Rückwärts-Wettrennen oder 'Wer rollt am weitesten?'.</p>
                <p><span class="time-badge">80-90m</span> <b>Auslagern & Feedback:</b><br>Boote putzen, kurze Besprechung.</p>
            `;
            planDiv.innerHTML = content;
            resBox.scrollIntoView({ behavior: 'smooth' });
        }

        function getHauptteil(tide) {
            if(tide === "flut") return "3x 8 Min. Pyramide gegen den Strom (Steigerung der Kraft).";
            if(tide === "ebbe") return "4x 500m Sprints mit dem Strom, Fokus auf schnelles Händewegführen.";
            return "Slalom um Bojen oder Technik-Fokus: 10 Schläge Augen zu, 10 Schläge auf.";
        }

        function downloadPlan() {
            const text = document.getElementById('full-plan').innerText;
            const blob = new Blob([text], { type: "text/plain" });
            const anchor = document.createElement("a");
            anchor.download = "Ruder_Trainingsplan.txt";
            anchor.href = window.URL.createObjectURL(blob);
            anchor.click();
        }
    </script>
</body>
</html>
