<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EliteRow Planner Pro | Detail-Training</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root {
            --primary: #00d2ff; --secondary: #3a7bd5; --bg-dark: #0f172a;
            --glass: rgba(255, 255, 255, 0.05); --glass-border: rgba(255, 255, 255, 0.1);
            --text: #f8fafc; --accent: #f43f5e; --success: #10b981; --warning: #f59e0b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: radial-gradient(circle at top left, #1e293b, #0f172a); color: var(--text); min-height: 100vh; }

        .app-container { display: grid; grid-template-columns: 280px 1fr; min-height: 100vh; }

        /* Sidebar */
        aside { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); border-right: 1px solid var(--glass-border); padding: 2rem; position: sticky; top: 0; height: 100vh; }
        .logo { font-size: 1.6rem; font-weight: 800; background: linear-gradient(to right, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 2rem; }
        nav li { padding: 12px; margin-bottom: 8px; border-radius: 10px; cursor: pointer; transition: 0.3s; list-style: none; color: #94a3b8; display: flex; align-items: center; gap: 10px; }
        nav li:hover, nav li.active { background: var(--glass); color: var(--primary); }

        /* Main Content */
        main { padding: 2.5rem; max-width: 1200px; margin: 0 auto; width: 100%; }
        .card { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid var(--glass-border); border-radius: 20px; padding: 2rem; margin-bottom: 2rem; }
        h2 { font-size: 1.8rem; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 12px; }

        /* Planner Controls */
        .planner-config { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .mode-toggle { display: flex; background: #000; border-radius: 12px; padding: 5px; margin-bottom: 20px; }
        .mode-btn { flex: 1; padding: 10px; border-radius: 8px; border: none; cursor: pointer; background: transparent; color: white; font-weight: 600; transition: 0.3s; }
        .mode-btn.active { background: var(--secondary); }

        /* Training Plan Detail Styling */
        .kid-plan-card { background: rgba(255,255,255,0.03); border-left: 4px solid var(--primary); padding: 20px; border-radius: 12px; margin-bottom: 25px; }
        .exercise-block { margin-top: 15px; padding-left: 15px; border-left: 1px solid #334155; }
        .ex-title { color: var(--primary); font-weight: 600; font-size: 1rem; margin-bottom: 4px; display: flex; justify-content: space-between;}
        .ex-time { color: #94a3b8; font-size: 0.85rem; font-weight: normal; }
        .ex-desc { color: #f8fafc; font-size: 0.95rem; margin-bottom: 10px; line-height: 1.4; font-weight: 600;}
        .ex-instruction { background: rgba(0,210,255,0.05); padding: 12px; border-radius: 6px; font-size: 0.85rem; color: #cbd5e1; border-left: 3px solid var(--primary); line-height: 1.5; }
        
        .comp-focus { background: rgba(244, 63, 94, 0.1); border-left: 3px solid var(--accent); padding: 12px; border-radius: 6px; margin-top: 15px; font-size: 0.85rem; color: #fecdd3; }

        /* Forms */
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 5px; font-size: 0.8rem; color: #94a3b8; text-transform: uppercase; }
        input, select { width: 100%; background: #0f172a; border: 1px solid #334155; padding: 12px; border-radius: 8px; color: white; }
        .btn { background: var(--secondary); color: white; padding: 12px 24px; border-radius: 10px; border: none; cursor: pointer; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; transition: 0.3s; }
        .btn:hover { background: var(--primary); transform: translateY(-2px); }
        .btn-ghost { background: transparent; border: 1px solid var(--glass-border); }

        .badge { padding: 4px 8px; border-radius: 6px; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; }
        .badge-water { background: #0369a1; }
        .badge-hall { background: #7c3aed; }
        .badge-comp { background: var(--accent); color: white; margin-left: 10px;}

        @media (max-width: 900px) { .app-container { grid-template-columns: 1fr; } aside { display: none; } }
    </style>
</head>
<body>

<div class="app-container">
    <aside>
        <div class="logo"><i class="fas fa-water"></i> ELITEROW</div>
        <nav>
            <li class="active" onclick="showSection('dashboard')"><i class="fas fa-home"></i> Dashboard</li>
            <li onclick="showSection('kids')"><i class="fas fa-users"></i> Kader</li>
            <li onclick="showSection('planner')"><i class="fas fa-calendar-check"></i> Trainingsplan</li>
        </nav>
    </aside>

    <main>
        <!-- DASHBOARD -->
        <section id="dashboard-section">
            <h2>Dashboard</h2>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="card">
                    <h3><i class="fas fa-cloud-sun"></i> Live-Wetter</h3>
                    <div id="weather-info" style="font-size: 1.5rem; margin: 15px 0;">Lade Daten...</div>
                    <p id="weather-hint" style="color: var(--warning);"></p>
                </div>
                <div class="card">
                    <h3><i class="fas fa-info-circle"></i> Kader-Status</h3>
                    <div id="stats-info" style="font-size: 1.5rem; margin: 15px 0;">0 Sportler aktiv</div>
                </div>
            </div>
        </section>

        <!-- KIDS -->
        <section id="kids-section" style="display:none;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2>Kader-Management</h2>
                <button class="btn" onclick="openModal()"><i class="fas fa-plus"></i> Sportler hinzufügen</button>
            </div>
            <div id="kids-list" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 20px;"></div>
        </section>

        <!-- PLANNER -->
        <section id="planner-section" style="display:none;">
            <h2>Trainingsplan-Generator</h2>
            <div class="card">
                <div class="mode-toggle">
                    <button id="btn-water" class="mode-btn active" onclick="setMode('Wasser')">WASSERTRAINING</button>
                    <button id="btn-hall" class="mode-btn" onclick="setMode('Halle')">HALLENTRAINING</button>
                </div>
                
                <div class="planner-config">
                    <div class="form-group">
                        <label>Wettkampf-Datum</label>
                        <input type="date" id="comp-date">
                    </div>
                    <div class="form-group">
                        <label>Trainingsdauer (Minuten)</label>
                        <input type="number" id="train-duration" value="90">
                    </div>
                </div>
                
                <button class="btn" onclick="generateDetailedPlan()"><i class="fas fa-magic"></i> Plan detailliert generieren</button>
                <button class="btn btn-ghost" onclick="exportPDF()"><i class="fas fa-file-pdf"></i> PDF Export</button>
            </div>

            <div id="plan-output" style="display:none;"></div>
        </section>
    </main>
</div>

<!-- MODAL -->
<div id="modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:100; align-items:center; justify-content:center;">
    <div class="card" style="width: 400px;">
        <h3>Sportler hinzufügen</h3>
        <div class="form-group">
            <label>Name</label>
            <input type="text" id="k-name">
        </div>
        <div class="form-group">
            <label>Erfahrungslevel</label>
            <select id="k-level">
                <option value="1">Anfänger (Level 1)</option>
                <option value="2">Fortgeschritten (Level 2)</option>
                <option value="3">Leistungssport (Level 3)</option>
                <option value="4">Elite/Wettkampf (Level 4)</option>
            </select>
        </div>
        <div class="form-group">
            <label>Aktiver Wettkampfkader?</label>
            <select id="k-comp">
                <option value="ja">Ja (Spezifisches Renntraining)</option>
                <option value="nein">Nein (Nur Fitness/Technik)</option>
            </select>
        </div>
        <div style="display: flex; gap: 10px;">
            <button class="btn" onclick="saveKid()">Speichern</button>
            <button class="btn btn-ghost" onclick="closeModal()">Abbrechen</button>
        </div>
    </div>
</div>

<script>
    let state = {
        kids: JSON.parse(localStorage.getItem('rowing_v2_kids')) || [],
        mode: 'Wasser',
        weather: { wind: 0, temp: 0 }
    };

    window.onload = () => {
        fetchWeather();
        renderKids();
        updateStats();
    };

    function setMode(m) {
        state.mode = m;
        document.getElementById('btn-water').classList.toggle('active', m === 'Wasser');
        document.getElementById('btn-hall').classList.toggle('active', m === 'Halle');
    }

    async function fetchWeather() {
        try {
            const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=53.55&longitude=8.59&current=temperature_2m,wind_speed_10m');
            const data = await res.json();
            state.weather.wind = data.current.wind_speed_10m;
            state.weather.temp = data.current.temperature_2m;
            document.getElementById('weather-info').innerHTML = `${state.weather.temp}°C | Wind: ${state.weather.wind} km/h`;
            if(state.weather.wind > 20) {
                document.getElementById('weather-hint').innerText = "Achtung: Wind zu stark für Anfänger im Einer!";
            } else if (state.weather.temp < 10) {
                document.getElementById('weather-hint').innerText = "Kaltes Wetter: Auf längeres Aufwärmen an Land achten.";
            }
        } catch(e) {}
    }

    function showSection(id) {
        document.querySelectorAll('main > section').forEach(s => s.style.display = 'none');
        document.getElementById(id + '-section').style.display = 'block';
        document.querySelectorAll('nav li').forEach(l => l.classList.remove('active'));
        event.currentTarget.classList.add('active');
    }

    function openModal() { document.getElementById('modal').style.display = 'flex'; }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    function saveKid() {
        const name = document.getElementById('k-name').value;
        const level = parseInt(document.getElementById('k-level').value);
        const comp = document.getElementById('k-comp').value;
        if(!name) return;
        state.kids.push({ id: Date.now(), name, level, comp });
        localStorage.setItem('rowing_v2_kids', JSON.stringify(state.kids));
        renderKids(); updateStats(); closeModal();
    }
    function deleteKid(id) {
        state.kids = state.kids.filter(k => k.id !== id);
        localStorage.setItem('rowing_v2_kids', JSON.stringify(state.kids));
        renderKids(); updateStats();
    }
    
    function renderKids() {
        const list = document.getElementById('kids-list');
        list.innerHTML = state.kids.map(k => `
            <div class="card" style="padding: 15px;">
                <h4>${k.name} ${k.comp === 'ja' ? '<span class="badge badge-comp"><i class="fas fa-trophy"></i></span>' : ''}</h4>
                <p style="font-size:0.8rem; color:#94a3b8; margin-top:5px;">Level ${k.level}</p>
                <button class="btn btn-ghost" onclick="deleteKid(${k.id})" style="margin-top:10px; padding: 5px 10px; font-size: 0.8rem;">Entfernen</button>
            </div>
        `).join('');
    }
    function updateStats() { document.getElementById('stats-info').innerText = `${state.kids.length} Sportler im Kader`; }

    /* CORE GENERATOR LOGIC */
    function generateDetailedPlan() {
        if(state.kids.length === 0) return alert("Kader leer!");
        
        const duration = parseInt(document.getElementById('train-duration').value) || 90;
        const times = {
            warmup: Math.round(duration * 0.15),
            technique: Math.round(duration * 0.25),
            main: Math.round(duration * 0.50),
            cooldown: Math.round(duration * 0.10)
        };

        const output = document.getElementById('plan-output');
        const phase = calculatePhase();
        
        let html = `<div id="plan-capture" style="background:#0f172a; padding:30px; border-radius:20px; border: 1px solid #334155;">
            <div style="text-align:center; margin-bottom:30px; border-bottom: 2px solid var(--primary); padding-bottom:15px;">
                <h1 style="color:white; margin-bottom: 10px;">TRAININGSPLAN: ${state.mode.toUpperCase()}</h1>
                <p style="color:var(--primary); font-weight:bold;">Makro-Phase: ${phase} | Dauer: ${duration} Min | Datum: ${new Date().toLocaleDateString()}</p>
                ${state.weather.wind > 15 ? `<p style="color:var(--warning); font-size: 0.85rem; margin-top:10px;"><i class="fas fa-exclamation-triangle"></i> Windwarnung (${state.weather.wind} km/h) berücksichtigt.</p>` : ''}
            </div>`;

        state.kids.forEach(kid => {
            html += generateIndividualKidPlan(kid, phase, state.mode, times);
        });

        html += `</div>`;
        output.innerHTML = html;
        output.style.display = 'block';
    }

    function calculatePhase() {
        const d = document.getElementById('comp-date').value;
        if(!d) return "Grundlagenausdauer (GA) - Kein spezifischer Wettkampf hinterlegt";
        const diff = (new Date(d) - new Date()) / (1000*3600*24);
        if(diff < 14) return "Wettkampf-Peak (Tapering & Sprints)";
        if(diff < 45) return "Spezifische Ausdauer (WSA & Laktattoleranz)";
        return "Aufbauphase (Technik, Kraftausdauer & GA1)";
    }

    function generateIndividualKidPlan(kid, phase, mode, times) {
        const exercises = (mode === 'Wasser') ? getWaterDetails(kid, phase) : getHallDetails(kid, phase);
        
        let compBlock = "";
        if (kid.comp === 'ja') {
            const compText = mode === 'Wasser' ? 
                `<strong><i class="fas fa-flag-checkered"></i> Wettkampf-Fokus:</strong> Am Ende des Hauptteils 3x Startübung (Startschlag + 5 Übergangsschläge). Fokus auf explosive Kraftübertragung ohne Technikverlust.` :
                `<strong><i class="fas fa-flag-checkered"></i> Wettkampf-Fokus:</strong> Visualisierungstraining während des Ergos: Stelle dir die letzten 250m deines Rennens vor. Erhöhe auf den letzten 2 Minuten die Schlagfrequenz um +2.`;
            compBlock = `<div class="comp-focus">${compText}</div>`;
        }

        return `
        <div class="kid-plan-card">
            <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                <div>
                    <h3 style="color:white; font-size: 1.4rem;">${kid.name}</h3>
                    <p style="font-size:0.85rem; color:var(--primary); margin-top:4px;">Level ${kid.level} Fokus: ${getLevelGoal(kid.level)}</p>
                </div>
                <div>
                    <span class="badge ${mode === 'Wasser' ? 'badge-water' : 'badge-hall'}">${mode}</span>
                    ${kid.comp === 'ja' ? '<span class="badge badge-comp">Wettkampf</span>' : ''}
                </div>
            </div>
            
            <div class="exercise-block">
                <div class="ex-title">1. Vorbereitung & Aufwärmen <span class="ex-time">${times.warmup} Min</span></div>
                <div class="ex-desc">${exercises.warmup.name}</div>
                <div class="ex-instruction"><strong>Ausführung:</strong> ${exercises.warmup.desc}</div>
            </div>

            <div class="exercise-block">
                <div class="ex-title">2. Technik- & Motorik <span class="ex-time">${times.technique} Min</span></div>
                <div class="ex-desc">${exercises.technique.name}</div>
                <div class="ex-instruction"><strong>Trainer-Hinweis:</strong> ${exercises.technique.desc}</div>
            </div>

            <div class="exercise-block">
                <div class="ex-title">3. Physischer Hauptteil <span class="ex-time">${times.main} Min</span></div>
                <div class="ex-desc">${exercises.main.name}</div>
                <div class="ex-instruction"><strong>Trainingsziel:</strong> ${exercises.main.desc}</div>
                ${compBlock}
            </div>

            <div class="exercise-block">
                <div class="ex-title">4. Cool-down & Pflege <span class="ex-time">${times.cooldown} Min</span></div>
                <div class="ex-desc">${exercises.cooldown.name}</div>
                <div class="ex-instruction">${exercises.cooldown.desc}</div>
            </div>
        </div>`;
    }

    function getLevelGoal(lvl) {
        const goals = [
            "", 
            "Sicherheit im Boot, Balance & Basis-Bewegungsablauf", 
            "Wasserfassen, Rhythmus & Blattführung", 
            "Druckverlauf, Krafteinsatz & Streckenausdauer", 
            "Laktattoleranz, Renntaktik & Maximale Bootsgeschwindigkeit"
        ];
        return goals[lvl];
    }

    /* DATA REPOSITORY FOR TASKS (VERY SPECIFIC NOW) */
    function getWaterDetails(kid, phase) {
        const windWarning = state.weather.wind > 15 ? " Wegen Wind: Skulls etwas fester greifen und Blätter beim Vorrollen flach halten!" : "";
        let data = { warmup: {}, technique: {}, main: {}, cooldown: { name: "Locker Auspaddeln", desc: "Komplett kraftfrei rudern. Danach Boot mit Süßwasser abwaschen." } };

        switch(kid.level) {
            case 1: // Anfänger
                data.warmup = { name: "Bootsgewöhnung im Gig/Breitboot", desc: `Ablegen üben. 5 Minuten nur mit den Armen rudern, um das Gleichgewicht zu finden.${windWarning}` };
                data.technique = { name: "Sequenz-Rudern", desc: "Trennung der Bewegung: 1. Nur Arme, 2. Arme + Oberkörper, 3. Halbe Rollschiene. Auf sauberes Vorrollen ohne Hektik achten." };
                data.main = { name: "Kilometer sammeln (GA1 Basis)", desc: "Gleichmäßiges Rudern mit sehr geringem Krafteinsatz. Fokus: Das Boot soll nicht kippeln. Pausen alle 500m." };
                break;
            case 2: // Fortgeschritten
                data.warmup = { name: "Einrudern mit Rhythmuswechsel", desc: "Langsam beginnen. Jeden 3. Schlag etwas kräftiger ziehen. SF (Schlagfrequenz) bei 18 halten." };
                data.technique = { name: "Pausenrudern am Umkehrpunkt", desc: `2 Sekunden Pause, wenn die Hände über den Knien sind. Boot muss komplett waagerecht liegen.${windWarning}` };
                data.main = { name: "Streckenrudern mit Druckaufbau", desc: "4x 1000m Rudern. Auf den mittleren 500m den Druck auf die Beine erhöhen (GA1-GA2). Sauberes Wasserfassen." };
                break;
            case 3: // Leistungssport
                data.warmup = { name: "Dynamisches Warm-up & Core", desc: "15 Schläge Beinarbeit isoliert. Danach fließender Übergang in den vollen Rollweg." };
                data.technique = { name: "Blind-Rudern & Wassergefühl", desc: "Augen für 10 Schläge schließen. Spüre den Widerstand am Blatt beim Durchzug und das 'Laufen' des Bootes in der Freilaufphase." };
                data.main = phase.includes("Peak") ? 
                    { name: "WSA Intervalle (Wettkampftempo)", desc: "6x 500m im Renntempo (SF 30-34). Dazwischen 2 Min lockeres Paddeln. Fokus auf aggressiven Beinstoß." } :
                    { name: "Fahrtspiel (Fartlek)", desc: "Wechselnde Intensitäten: 3 Min GA1 (SF 20) -> 2 Min GA2 (SF 24) -> 1 Min Entwicklungsbereich (SF 28). Diesen Block 4x wiederholen." };
                break;
            case 4: // Elite
                data.warmup = { name: "Spezifische Mobilisation", desc: "Reverse Pick-Drill. Fokus auf die absolut synchrone Kraftübertragung ab dem Catch (Wasserfassen)." };
                data.technique = { name: "Catch-Placement & Suspension", desc: "Die Blätter müssen ins Wasser fallen, BEVOR der Beindruck beginnt. Übung: 'Tap-Downs' am Catch." };
                data.main = phase.includes("Peak") ? 
                    { name: "Start- & Spurt-Simulation", desc: "3x 1000m. Die ersten 250m Vollgas (Startphase), dann 500m Streckenschlag (SF 32), letzte 250m Endspurt (SF 36+)." } :
                    { name: "Laktatschwelle (AT-Training)", desc: "3x 3000m knapp unter der anaeroben Schwelle (SF 24-26). Konstant hoher Druck pro Schlag. 4 Min aktive Pause." };
                break;
        }
        return data;
    }

    function getHallDetails(kid, phase) {
        let data = { warmup: {}, technique: {}, main: {}, cooldown: { name: "Stretching & Blackroll", desc: "Fokus auf Hüftbeuger, vorderer Oberschenkel und unteren Rücken. Ergo-Schiene reinigen!" } };

        switch(kid.level) {
            case 1: 
                data.warmup = { name: "Gymnastik & Ergo-Start", desc: "10 Min Hampelmann, Kniehebelauf. Dann auf dem Ergo (Luftklappe 1-2) leicht anrollen." };
                data.technique = { name: "Ergo-Positionsschulung", desc: "Griffhaltung kontrollieren (Finger locker). Hände schnell vom Körper wegführen, bevor die Knie hochkommen." };
                data.main = { name: "Fitness-Zirkel", desc: "Im Wechsel: 5 Min Ergo (SF 18) -> 1 Min Unterarmstütz -> 15 Kniebeugen. Das Ganze 3 Runden." };
                break;
            case 2:
                data.warmup = { name: "Ergo Einrudern", desc: "Drag Factor auf ca. 100 stellen. 10 Minuten locker rudern, alle 2 Min für 10 Schläge die Beine betonen." };
                data.technique = { name: "Kraftübertragungskurve", desc: "Auf dem PM-Monitor die Kraftkurve anzeigen lassen. Das Ziel ist eine gleichmäßige, parabelförmige Kurve ohne Dellen." };
                data.main = { name: "Stufen-Test Basis", desc: "3x 8 Min auf dem Ergo. 1. Block: SF 18, 2. Block: SF 20, 3. Block: SF 22. Der Puls sollte pro Stufe leicht steigen." };
                break;
            case 3:
                data.warmup = { name: "Aufwärmen & Aktivierung", desc: "10 Min Ergo, gefolgt von dynamischem Dehnen. 3x 10 Medizinball-Würfe (für Explosivität aus dem Rumpf)." };
                data.technique = { name: "Watt pro Schlag maximieren", desc: "Versuche bei sehr niedriger Frequenz (SF 16-18) maximale Wattzahlen zu ziehen, um die spezifische Ruderkraft zu testen." };
                data.main = phase.includes("Peak") ? 
                    { name: "Anaerobes Intervalltraining", desc: "8x 500m Ergo voll (Pace wie im 2000m Test). 1:30 Min Pause. Ziel ist es, die Zeit exakt konstant zu halten." } :
                    { name: "GA1 Langstrecke", desc: "2x 20 Min. Konstant bei 70-75% der max. Herzfrequenz. Mentales Training: Technik trotz Ermüdung sauber halten." };
                break;
            case 4:
                data.warmup = { name: "Wettkampf-Warmup Protokoll", desc: "15 Min spezifisches Einfahren inkl. 3 kurzer Sprints (10 Schläge) zur Aktivierung des ZNS." };
                data.technique = { name: "Rhythmus & Ratio", desc: "Fokus auf das Verhältnis Durchzug zu Vorrollen (1:2). Schneller, harter Zug, kontrolliertes, entspanntes Vorrollen." };
                data.main = phase.includes("Peak") ? 
                    { name: "Laktattoleranz (VO2Max)", desc: "4x 1000m (Pace: 2K-Zieltempo minus 1 Sekunde). 3 Minuten Pause. Sehr hartes Training für den Wettkampf-Punch." } :
                    { name: "Schwellentraining / Kraftausdauer", desc: "3x 15 Min Ergo (SF 24, Drag Factor 130). Alternierend mit Langhantel-Kniebeugen (4x 8 Reps, 75% 1RM)." };
                break;
        }
        return data;
    }

    /* PDF EXPORT */
    async function exportPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('p', 'pt', 'a4');
        const element = document.getElementById('plan-capture');
        if(!element) return alert("Bitte generiere zuerst einen Plan!");

        await html2canvas(element, { scale: 2, backgroundColor: "#0f172a" });
        doc.html(element, {
            callback: function(doc) { doc.save(`EliteRow_Trainingsplan_${new Date().toISOString().split('T')[0]}.pdf`); },
            x: 20, y: 20, width: 550, windowWidth: 1000
        });
    }
</script>
