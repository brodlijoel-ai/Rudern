<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RowCoach Junior - Trainingsplaner</title>
    <style>
        :root {
            --primary: #2563eb;
            --success: #22c55e;
            --warning: #eab308;
            --danger: #ef4444;
            --dark: #1e293b;
            --light: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f1f5f9;
            color: var(--dark);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 4px rgb(0 0 0 / 0.05);
            margin-bottom: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        h2 { border-bottom: 2px solid var(--primary); padding-bottom: 8px; color: var(--primary); }

        /* Wetter-Status */
        #status-box {
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            text-align: center;
            margin-top: 10px;
        }

        .status-go { background-color: var(--success); color: white; }
        .status-caution { background-color: var(--warning); color: black; }
        .status-stop { background-color: var(--danger); color: white; }

        /* Formular-Elemente */
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            box-sizing: border-box;
        }

        button {
            cursor: pointer;
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: bold;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.9; }
        button.secondary { background: #64748b; }

        /* Kinder-Liste */
        .kid-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #e2e8f0;
        }

        /* Trainingsplan Tabelle */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th, td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid #e2e8f0;
        }

        /* Timer */
        .timer-display {
            font-size: 2.5rem;
            font-family: monospace;
            text-align: center;
            margin: 10px 0;
            background: var(--dark);
            color: var(--success);
            padding: 10px;
            border-radius: 8px;
        }

        /* Responsive Mobile */
        @media (max-width: 600px) {
            .grid { grid-template-columns: 1fr; }
            body { padding: 10px; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🚣 RowCoach Junior</h1>
        <p>Intelligenter Trainingsplaner für 10-14 Jährige</p>
    </header>

    <div class="grid">
        <div class="card">
            <h2>1. Umwelt-Check</h2>
            <div class="form-group">
                <label>Temperatur (°C)</label>
                <input type="number" id="temp" value="18" oninput="analyzeWeather()">
            </div>
            <div class="form-group">
                <label>Windstärke (Bft)</label>
                <select id="wind" onchange="analyzeWeather()">
                    <option value="1">1-2 (Leicht)</option>
                    <option value="3">3-4 (Mäßig)</option>
                    <option value="5">5+ (Stark)</option>
                </select>
            </div>
            <div class="form-group">
                <label>Regen</label>
                <select id="rain" onchange="analyzeWeather()">
                    <option value="no">Kein Regen</option>
                    <option value="yes">Es regnet</option>
                </select>
            </div>
            <div id="status-box" class="status-go">Bereit für Analyse</div>
        </div>

        <div class="card">
            <h2>2. Zeit & Ziel</h2>
            <div class="form-group">
                <label>Trainingsbeginn</label>
                <input type="time" id="start-time" value="16:00" onchange="generatePlan()">
            </div>
            <div class="form-group">
                <label>Nächster Wettkampf</label>
                <input type="date" id="race-date" onchange="updateRaceInfo()">
            </div>
            <div id="race-countdown" style="font-weight: bold; color: var(--primary);"></div>
        </div>
    </div>

    <div class="card">
        <h2>3. Mannschaft (Kinder)</h2>
        <div style="display: flex; gap: 10px; margin-bottom: 15px;">
            <input type="text" id="new-kid-name" placeholder="Name des Kindes">
            <button onclick="addKid()">Hinzufügen</button>
        </div>
        <div id="kids-list"></div>
    </div>

    <div class="card" id="plan-section">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2>4. Dynamischer Trainingsplan (90 Min)</h2>
            <button onclick="downloadPlan()">Plan Exportieren</button>
        </div>
        <div id="training-type-badge" style="font-weight: bold; margin-bottom: 10px;"></div>
        <table id="plan-table">
            <thead>
                <tr>
                    <th>Zeit</th>
                    <th>Dauer</th>
                    <th>Aktivität / Inhalt</th>
                </tr>
            </thead>
            <tbody id="plan-body"></tbody>
        </table>
    </div>

    <div class="card">
        <h2>5. Trainings-Timer</h2>
        <div class="timer-display" id="timer-val">00:00</div>
        <div style="display: flex; justify-content: center; gap: 10px;">
            <button onclick="startTimer()">Start</button>
            <button class="secondary" onclick="stopTimer()">Stop</button>
            <button class="secondary" onclick="resetTimer()">Reset</button>
        </div>
    </div>
</div>

<script>
    // Datenstrukturen
    let kids = JSON.parse(localStorage.getItem('rowKids')) || [
        {name: "Lukas", status: "wasser"},
        {name: "Emma", status: "wasser"}
    ];
    let timerInterval;
    let seconds = 0;

    // Wetter-Analyse
    function analyzeWeather() {
        const temp = document.getElementById('temp').value;
        const wind = document.getElementById('wind').value;
        const rain = document.getElementById('rain').value;
        const statusBox = document.getElementById('status-box');
        
        let decision = "wasser";
        let message = "✅ Aufs Wasser!";
        statusBox.className = "status-go";

        if (temp < 8 || rain === 'yes') {
            decision = "halle";
            message = "❌ Hallentraining (Kälte/Regen)";
            statusBox.className = "status-stop";
        } else if (wind >= 5) {
            decision = "halle";
            message = "❌ Hallentraining (Starker Wind)";
            statusBox.className = "status-stop";
        } else if (temp >= 30) {
            message = "⚠️ Vorsicht: Hitze! Extra Trinkpausen!";
            statusBox.className = "status-caution";
        } else if (wind >= 3) {
            message = "⚠️ Windig: Nur erfahrene Kinder!";
            statusBox.className = "status-caution";
        }

        generatePlan(decision, temp >= 30);
        return decision;
    }

    // Zeitberechnung
    function addMinutes(timeStr, mins) {
        const [h, m] = timeStr.split(':').map(Number);
        const date = new Date();
        date.setHours(h, m + mins);
        return date.getHours().toString().padStart(2, '0') + ":" + 
               date.getMinutes().toString().padStart(2, '0');
    }

    // Plan Generierung
    function generatePlan(mode = 'wasser', isHot = false) {
        const startTime = document.getElementById('start-time').value;
        const planBody = document.getElementById('plan-body');
        const badge = document.getElementById('training-type-badge');
        planBody.innerHTML = '';

        let structure = [];
        if (mode === 'wasser') {
            badge.innerText = "🌊 Modus: Wassertraining";
            badge.style.color = "var(--primary)";
            structure = [
                { title: "Begrüßung & Bootseinteilung", dur: 10 },
                { title: "Erwärmung & Dehnen", dur: 10 },
                { title: "Boote zu Wasser lassen", dur: 10 },
                { title: isHot ? "Technik & Rudern (inkl. Trinkpausen)" : "Technik & Ausdauer", dur: 40 },
                { title: "Anlegen & Boote reinigen", dur: 10 },
                { title: "Abschlussbesprechung", dur: 10 }
            ];
        } else {
            badge.innerText = "🏠 Modus: Hallentraining";
            badge.style.color = "var(--danger)";
            structure = [
                { title: "Begrüßung & Umziehen", dur: 5 },
                { title: "Laufspiel / Aufwärmen", dur: 15 },
                { title: "Kraft & Koordination (Zirkel)", dur: 30 },
                { title: "Ergometer-Wettkampf", dur: 20 },
                { title: "Abschlussspiel", dur: 15 },
                { title: "Feedbackrunde", dur: 5 }
            ];
        }

        let currentTime = startTime;
        structure.forEach(item => {
            const row = `<tr>
                <td>${currentTime}</td>
                <td>${item.dur} Min</td>
                <td>${item.title}</td>
            </tr>`;
            planBody.innerHTML += row;
            currentTime = addMinutes(currentTime, item.dur);
        });
    }

    // Kinder-Verwaltung
    function renderKids() {
        const list = document.getElementById('kids-list');
        list.innerHTML = '';
        kids.forEach((kid, index) => {
            list.innerHTML += `
                <div class="kid-item">
                    <span>${kid.name}</span>
                    <div>
                        <select onchange="updateKidStatus(${index}, this.value)">
                            <option value="wasser" ${kid.status === 'wasser' ? 'selected' : ''}>Wasser OK</option>
                            <option value="halle" ${kid.status === 'halle' ? 'selected' : ''}>Nur Halle</option>
                        </select>
                        <button onclick="removeKid(${index})" style="background:var(--danger); padding: 5px 10px; margin-left:10px;">X</button>
                    </div>
                </div>
            `;
        });
        localStorage.setItem('rowKids', JSON.stringify(kids));
    }

    function addKid() {
        const input = document.getElementById('new-kid-name');
        if (input.value) {
            kids.push({name: input.value, status: "wasser"});
            input.value = '';
            renderKids();
        }
    }

    function removeKid(index) {
        kids.splice(index, 1);
        renderKids();
    }

    function updateKidStatus(index, val) {
        kids[index].status = val;
        renderKids();
    }

    // Wettkampf-Logik
    function updateRaceInfo() {
        const raceDate = new Date(document.getElementById('race-date').value);
        const today = new Date();
        const diffTime = raceDate - today;
        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        
        const info = document.getElementById('race-countdown');
        if (diffDays > 0) {
            info.innerText = `⏳ Noch ${diffDays} Tage bis zum Wettkampf! (Intensität: ${diffDays < 7 ? 'Hoch' : 'Normal'})`;
        } else {
            info.innerText = "";
        }
    }

    // Timer
    function startTimer() {
        if (timerInterval) return;
        timerInterval = setInterval(() => {
            seconds++;
            const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
            const secs = (seconds % 60).toString().padStart(2, '0');
            document.getElementById('timer-val').innerText = `${mins}:${secs}`;
        }, 1000);
    }

    function stopTimer() {
        clearInterval(timerInterval);
        timerInterval = null;
    }

    function resetTimer() {
        stopTimer();
        seconds = 0;
        document.getElementById('timer-val').innerText = "00:00";
    }

    // Export
    function downloadPlan() {
        const startTime = document.getElementById('start-time').value;
        const type = document.getElementById('training-type-badge').innerText;
        let content = `TRAININGSPLAN\nDatum: ${new Date().toLocaleDateString()}\nStart: ${startTime}\n${type}\n\nPLAN:\n`;
        
        const rows = document.querySelectorAll('#plan-table tr');
        rows.forEach(row => {
            const cols = row.querySelectorAll('td, th');
            content += Array.from(cols).map(c => c.innerText).join(" | ") + "\n";
        });

        content += "\nTEILNEHMER:\n";
        kids.forEach(k => content += `- ${k.name} (${k.status})\n`);

        const blob = new Blob([content], {type: 'text/plain'});
        const anchor = document.createElement('a');
        anchor.download = "trainingsplan.txt";
        anchor.href = (window.URL || window.webkitURL).createObjectURL(blob);
        anchor.click();
    }

    // Initialisierung
    window.onload = () => {
        analyzeWeather();
        renderKids();
    };
</script>

</body>
</html>
