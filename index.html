<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Geeste Ruder Coach</title>
    <style>
        :root { --blue: #007AFF; --dark: #1C1C1E; --light: #F2F2F7; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--light); 
            margin: 0; 
            padding: 20px; 
            padding-top: 60px; 
        }
        .card { 
            background: white; 
            border-radius: 20px; 
            padding: 20px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.05); 
            margin-bottom: 20px; 
        }
        h1 { font-size: 28px; font-weight: 800; margin-bottom: 20px; color: var(--dark); }
        h2 { font-size: 14px; color: #8E8E93; margin: 0 0 10px 0; text-transform: uppercase; letter-spacing: 1px; }
        .data { font-size: 24px; font-weight: 700; color: var(--blue); }
        select { 
            width: 100%; 
            padding: 15px; 
            border-radius: 12px; 
            border: 1px solid #ddd; 
            font-size: 17px; 
            margin-top: 10px;
            background-color: #fff;
        }
        button { 
            width: 100%; 
            padding: 18px; 
            border-radius: 12px; 
            border: none; 
            font-size: 18px; 
            margin-top: 15px; 
            background: var(--blue); 
            color: white; 
            font-weight: 600; 
            cursor: pointer; 
            -webkit-appearance: none;
        }
        .rec-box { 
            background: #E5F1FF; 
            border-left: 5px solid var(--blue); 
            padding: 15px; 
            border-radius: 0 12px 12px 0; 
            line-height: 1.5;
        }
        .warmup-item { display: flex; align-items: center; margin-bottom: 12px; font-size: 16px; }
        .dot { height: 10px; width: 10px; background: var(--blue); border-radius: 50%; margin-right: 12px; flex-shrink: 0; }
        #status-msg { font-size: 14px; color: #666; margin-top: 5px; }
    </style>
</head>
<body>

    <h1>🚣‍♂️ Geeste Coach</h1>

    <div class="card">
        <h2>Aktuelles Wetter (Bremerhaven)</h2>
        <div id="weather" class="data">Lade Daten...</div>
        <div id="status-msg">Wird aktualisiert...</div>
    </div>

    <div class="card">
        <h2>Gezeiten auf der Geeste</h2>
        <select id="tide">
            <option value="flut">Flut (Strömung landeinwärts)</option>
            <option value="ebbe">Ebbe (Strömung seewärts)</option>
            <option value="hoch">Hochwasser (Stillstand)</option>
            <option value="niedrig">Niedrigwasser (Vorsicht)</option>
        </select>
        <button onclick="getPlan()">Trainingsplan erstellen</button>
    </div>

    <div id="result" class="card" style="display:none;">
        <h2>Dein Training heute</h2>
        <div id="plan" class="rec-box"></div>
        
        <h2 style="margin-top:25px;">Vorgehen: Warm-Up</h2>
        <div class="warmup-item"><div class="dot"></div> 5 Min. Locker einrudern (Oberkörper)</div>
        <div class="warmup-item"><div class="dot"></div> Dynamisches Dehnen der Schultern</div>
        <div class="warmup-item"><div class="dot"></div> 10 Kniebeugen am Steg</div>
        <div class="warmup-item"><div class="dot"></div> Fokus: Sauberes Blattsetzen</div>
    </div>

    <script>
        // Funktion zum Abrufen der Wetterdaten
        async function fetchWeather() {
            const weatherDiv = document.getElementById('weather');
            const statusMsg = document.getElementById('status-msg');
            
            try {
                // Open-Meteo API für Bremerhaven
                const response = await fetch('https://api.open-meteo.com/v1/forecast?latitude=53.54&longitude=8.58&current_weather=true');
                
                if (!response.ok) throw new Error('Netzwerk-Fehler');
                
                const data = await response.json();
                const w = data.current_weather;
                
                weatherDiv.innerHTML = `${w.temperature}°C | ${w.windspeed} km/h Wind`;
                statusMsg.innerHTML = "Daten live von der Mündung";
                
                // Warnung bei zu viel Wind
                if(w.windspeed > 25) {
                    weatherDiv.style.color = "#FF3B30";
                    statusMsg.innerHTML = "⚠️ Achtung: Starkwind!";
                }
            } catch (error) {
                weatherDiv.innerHTML = "-- °C";
                statusMsg.innerHTML = "Fehler beim Laden (Internet prüfen)";
                console.error('Wetter-Fehler:', error);
            }
        }

        // Funktion für die Trainingsempfehlung
        function getPlan() {
            const t = document.getElementById('tide').value;
            const resDiv = document.getElementById('result');
            const planDiv = document.getElementById('plan');
            
            resDiv.style.display = "block";

            let tipp = "";
            if(t === "flut") {
                tipp = "<b>Kraft-Ausdauer:</b> Du ruderst gegen die Flut landeinwärts. Nutze den Widerstand für kräftige Schläge. Fokus auf Beinarbeit!";
            } else if(t === "ebbe") {
                tipp = "<b>Technik & Speed:</b> Der Strom schiebt dich raus. Konzentriere dich auf blitzschnelles Wasserfassen und langes Rollen.";
            } else if(t === "hoch") {
                tipp = "<b>Intervalle/Sprints:</b> Ideales Flachwasser bei Stillstand. Perfekt für 500m Sprints oder Zeitfahren.";
            } else if(t === "niedrig") {
                tipp = "<b>Lockerer Paddel:</b> Vorsicht bei der Wende. Fokus auf Rhythmus und saubere Technik im flacheren Wasser.";
            }

            planDiv.innerHTML = tipp;
            
            // Sanftes Scrollen zum Plan
            setTimeout(() => {
                resDiv.scrollIntoView({ behavior: 'smooth' });
            }, 100);
        }

        // Beim Start Wetter laden
        window.onload = fetchWeather;
    </script>
</body>
</html>
